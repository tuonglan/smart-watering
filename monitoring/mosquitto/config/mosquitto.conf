# Mosquitto broker config for the Watering project.
# Runs on the Raspberry Pi, on the same LAN as the ESP32-S3 node(s).

listener 1883

# --- Auth ---------------------------------------------------------------
# Home LAN, trusted network: anonymous is the simplest start.
allow_anonymous true
#
# To harden later (recommended once it leaves the bench):
#   1. allow_anonymous false
#   2. password_file /mosquitto/config/passwd
#   3. docker compose exec mosquitto mosquitto_passwd -c /mosquitto/config/passwd esp32
#   Then put user/password into mqtt2prometheus/config.yaml and the V11 string.

# --- Persistence --------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# --- Logging ------------------------------------------------------------
log_dest stdout
log_type warning
log_type error
log_type notice
