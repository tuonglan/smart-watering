services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: watering-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"      # MQTT (ESP32 publishes here)
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - watering

  mqtt2prometheus:
    image: ghcr.io/hikhvar/mqtt2prometheus:latest
    container_name: watering-mqtt2prometheus
    restart: unless-stopped
    depends_on:
      - mosquitto
    command: ["-config", "/config.yaml"]
    ports:
      - "9641:9641"      # Prometheus scrapes /metrics here
    volumes:
      - ./mqtt2prometheus/config.yaml:/config.yaml:ro
    networks:
      - watering

  # Browser-based MQTT Explorer: live tree + per-value graphs, no Prometheus needed.
  # Server-side (Node) build, so it reaches the broker over the compose network at
  # mosquitto:1883 — the broker needs no websocket listener. Open http://<pi>:4000,
  # then add a connection once (host: mosquitto, port: 1883); it persists to the volume.
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer:latest
    container_name: watering-mqtt-explorer
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - "4000:4000"      # web UI
    environment:
      HTTP_PORT: "4000"
      CONFIG_PATH: /mqtt-explorer/config
      # HTTP_USER: admin           # uncomment to password-protect the UI
      # HTTP_PASSWORD: changeme
    volumes:
      - mqtt-explorer-config:/mqtt-explorer/config
    networks:
      - watering

networks:
  watering:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
  mqtt-explorer-config:
