services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: watering-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"      # MQTT (ESP32 publishes here)
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - watering

  mqtt2prometheus:
    image: ghcr.io/hikhvar/mqtt2prometheus:latest
    container_name: watering-mqtt2prometheus
    restart: unless-stopped
    depends_on:
      - mosquitto
    command: ["-config", "/config.yaml"]
    ports:
      - "9641:9641"      # Prometheus scrapes /metrics here
    volumes:
      - ./mqtt2prometheus/config.yaml:/config.yaml:ro
    networks:
      - watering

networks:
  watering:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
