# mqtt2prometheus: subscribes to the moisture topic, exposes /metrics on :9641.
#
# Contract with the ESP32-S3:
#   topic:   watering/<device_name>/moisture
#   payload: {"s0": <raw>, .., "r0": <0|1>, "r1": <0|1>}
#            sN  = 12-bit ADC moisture value, 0..4095 (only the configured pins)
#            rN  = relay/pump state, 1=on 0=off (always both relays)
#
# The <device_name> from the topic becomes the `sensor` label (exporter default).
# Rename it to `device` in the Prometheus scrape config if you like (see README).

mqtt:
  server: tcp://mosquitto:1883
  topic_path: watering/+/moisture
  device_id_regex: "watering/(?P<deviceid>[^/]+)/moisture"
  qos: 0
  # user: esp32
  # password: changeme

cache:
  # Drop a device's series if no message arrives within this window, so a dead
  # node disappears from Prometheus instead of showing a frozen last value.
  # Rule of thumb: ~3x the publish interval set in V11 (default 60s -> 180s).
  timeout: 180s

json_parsing:
  separator: .

# Channels are fixed: s0->GPIO4, s1->GPIO5, s2->GPIO6.
# A node that only configures 2 pins simply omits s2; that series just won't appear.
metrics:
  - prom_name: soil_moisture_raw
    mqtt_name: s0
    help: "Raw ADC moisture reading (0-4095). channel 0 / GPIO4"
    type: gauge
    const_labels:
      channel: "0"

  - prom_name: soil_moisture_raw
    mqtt_name: s1
    help: "Raw ADC moisture reading (0-4095). channel 1 / GPIO5"
    type: gauge
    const_labels:
      channel: "1"

  - prom_name: soil_moisture_raw
    mqtt_name: s2
    help: "Raw ADC moisture reading (0-4095). channel 2 / GPIO6"
    type: gauge
    const_labels:
      channel: "2"

  # Relays are fixed: r0->GPIO38, r1->GPIO39. Published in every moisture message
  # and immediately on any state change, so short pump runs are captured.
  - prom_name: relay_on
    mqtt_name: r0
    help: "Relay/pump state (1=on, 0=off). relay 0 / GPIO38"
    type: gauge
    const_labels:
      relay: "0"

  - prom_name: relay_on
    mqtt_name: r1
    help: "Relay/pump state (1=on, 0=off). relay 1 / GPIO39"
    type: gauge
    const_labels:
      relay: "1"
